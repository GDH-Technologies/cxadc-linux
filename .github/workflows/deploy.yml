name: Deploy cxadc-linux to cs0, cs1, and wm

on:
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - config/**
      - Makefile
      - dkms.conf
      - src/scripts/deploy_dkms_install.sh
      - .github/workflows/deploy.yml
  workflow_dispatch:
    inputs:
      force_reinstall:
        description: "Run deploy steps even if no relevant files changed"
        required: false
        type: boolean
        default: false
      reload_module:
        description: "Unload/reload cxadc module after install (can disrupt active captures)"
        required: false
        type: boolean
        default: false
      target_kernel:
        description: "Kernel release to install DKMS module for (empty = current uname -r)"
        required: false
        type: string
        default: ""
      install_all_kernels:
        description: "Build/install DKMS module for all /lib/modules kernels"
        required: false
        type: boolean
        default: false
      prune_old_versions:
        description: "Remove stale cxadc DKMS versions after successful install"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-cxadc-linux
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        host: [cs0, cs1, wm]
    runs-on:
      - self-hosted
      - Linux
      - X64
      - ${{ matrix.host }}

    steps:
      - name: Build and deploy
        shell: bash
        env:
          REPO_DIR: /home/rdodge/Repos/cxadc-linux
          BRANCH: master
          FORCE_REINSTALL: ${{ inputs.force_reinstall }}
          RELOAD_MODULE: ${{ inputs.reload_module }}
          DKMS_TARGET_KERNEL: ${{ inputs.target_kernel }}
          DKMS_INSTALL_ALL_KERNELS: ${{ inputs.install_all_kernels }}
          PRUNE_OLD_DKMS_VERSIONS: ${{ inputs.prune_old_versions }}
        run: |
          set -euo pipefail

          run_as_root() {
            if [ "$(id -u)" -eq 0 ]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          echo "Repo: ${REPO_DIR}"
          echo "Branch: ${BRANCH}"
          echo "Force reinstall: ${FORCE_REINSTALL:-false}"
          echo "Reload module: ${RELOAD_MODULE:-false}"
          echo "DKMS target kernel: ${DKMS_TARGET_KERNEL:-}"
          echo "DKMS install all kernels: ${DKMS_INSTALL_ALL_KERNELS:-false}"
          echo "Prune old DKMS versions: ${PRUNE_OLD_DKMS_VERSIONS:-false}"

          if [ ! -d "${REPO_DIR}/.git" ]; then
            echo "Repo not found at ${REPO_DIR}" >&2
            exit 1
          fi

          cd "${REPO_DIR}"

          current_branch="$(git rev-parse --abbrev-ref HEAD)"
          if [ "${current_branch}" != "${BRANCH}" ]; then
            echo "Expected branch ${BRANCH}, found ${current_branch}" >&2
            exit 1
          fi

          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree is dirty. Refusing to deploy:" >&2
            git status --porcelain
            exit 1
          fi

          git fetch --prune origin
          old_rev="$(git rev-parse HEAD)"
          git pull --ff-only origin "${BRANCH}"
          new_rev="$(git rev-parse HEAD)"

          echo "Revision: ${old_rev} -> ${new_rev}"

          echo "Checking DKMS version consistency (dkms.conf, kernel source, README)..."
          dkms_version="$(awk -F= '/^PACKAGE_VERSION=/{gsub(/"/,"",$2); print $2}' dkms.conf)"
          kernel_version="$(sed -nE 's/.*version ([0-9]+(\.[0-9]+)*)/\1/p' src/kernel/cxadc.c | head -n1)"
          readme_version="$(sed -nE 's/.*Current DKMS package version:[[:space:]]*`([^`]+)`.*/\1/p' README.md | head -n1)"

          if [ -z "${dkms_version}" ] || [ -z "${kernel_version}" ] || [ -z "${readme_version}" ]; then
            echo "ERROR: missing version marker in dkms.conf/src/kernel/cxadc.c/README.md" >&2
            exit 1
          fi
          if [ "${dkms_version}" != "${kernel_version}" ] || [ "${dkms_version}" != "${readme_version}" ]; then
            echo "ERROR: version mismatch detected" >&2
            echo "  dkms.conf: ${dkms_version}" >&2
            echo "  src/kernel/cxadc.c: ${kernel_version}" >&2
            echo "  README.md: ${readme_version}" >&2
            exit 1
          fi

          deploy_needed="false"
          if [ "${FORCE_REINSTALL:-false}" = "true" ]; then
            deploy_needed="true"
            echo "Force reinstall requested"
          elif [ "${old_rev}" != "${new_rev}" ]; then
            changed_files="$(git diff --name-only "${old_rev}" "${new_rev}" || true)"
            if [ -n "${changed_files}" ]; then
              echo "Changed files:"
              printf '%s\n' "${changed_files}"
              if echo "${changed_files}" | grep -qE '^(src/|config/|Makefile|dkms\.conf)'; then
                deploy_needed="true"
              fi
            fi
          else
            echo "No new commits"
          fi

          if [ "${deploy_needed}" != "true" ]; then
            echo "No deploy-relevant changes; skipping install"
            exit 0
          fi

          echo "Building module and userspace tools..."
          make clean
          make

          echo "Installing tools/config and DKMS module via root helper..."
          run_as_root env \
            DKMS_TARGET_KERNEL="${DKMS_TARGET_KERNEL:-}" \
            DKMS_INSTALL_ALL_KERNELS="${DKMS_INSTALL_ALL_KERNELS:-false}" \
            PRUNE_OLD_DKMS_VERSIONS="${PRUNE_OLD_DKMS_VERSIONS:-false}" \
            /usr/bin/bash "${REPO_DIR}/src/scripts/deploy_dkms_install.sh"

          if [ "${RELOAD_MODULE:-false}" = "true" ]; then
            modprobe_bin="$(command -v modprobe)"
            if [ -z "${modprobe_bin}" ]; then
              echo "ERROR: modprobe not found" >&2
              exit 1
            fi
            echo "Reloading cxadc module..."
            run_as_root "${modprobe_bin}" -r cxadc || true
            run_as_root "${modprobe_bin}" cxadc
          else
            echo "Skipping module reload (reload_module=false)"
          fi

          echo "Running post-deploy checks..."
          if ! command -v cx-capture >/dev/null 2>&1; then
            echo "ERROR: cx-capture not found in PATH after install" >&2
            exit 1
          fi
          if ! command -v leveladj >/dev/null 2>&1; then
            echo "ERROR: leveladj not found in PATH after install" >&2
            exit 1
          fi
          if ! command -v cxadc-status >/dev/null 2>&1; then
            echo "ERROR: cxadc-status not found in PATH after install" >&2
            exit 1
          fi

          python3 -m py_compile src/tools/cxadc-status/cxadc-status
          python3 src/tools/cxadc-status/cxadc-status --plain --no-color || true

          dkms_name="$(awk -F= '/^PACKAGE_NAME=/{gsub(/"/,"",$2); print $2}' dkms.conf)"
          dkms_version="$(awk -F= '/^PACKAGE_VERSION=/{gsub(/"/,"",$2); print $2}' dkms.conf)"

          dkms_status="$(dkms status -m "${dkms_name}" -v "${dkms_version}" || true)"
          echo "${dkms_status}"
          if ! echo "${dkms_status}" | grep -qE "^${dkms_name}/${dkms_version}, .*: installed"; then
            echo "ERROR: target DKMS version is not installed" >&2
            exit 1
          fi
          if echo "${dkms_status}" | grep -qE "^${dkms_name}/${dkms_version}, .*: built$"; then
            echo "ERROR: target DKMS version is built but not installed for at least one kernel" >&2
            exit 1
          fi
          if echo "${dkms_status}" | grep -q "Differences between built and installed modules"; then
            echo "ERROR: target DKMS version reports installed-module drift" >&2
            exit 1
          fi

          modinfo_path="$(modinfo -n cxadc)"
          if ! echo "${modinfo_path}" | grep -q '/updates/dkms/'; then
            echo "ERROR: cxadc module path is not from updates/dkms: ${modinfo_path}" >&2
            exit 1
          fi

          running_kernel="$(uname -r)"
          if ! modinfo -F vermagic cxadc | grep -q "${running_kernel}"; then
            echo "ERROR: cxadc vermagic does not match running kernel ${running_kernel}" >&2
            exit 1
          fi

          echo "Deploy completed on ${{ matrix.host }}"
