PACKAGE_NAME="cxadc"
PACKAGE_VERSION="0.5"

# Kernel module sources now live under src/kernel/. DKMS copies the source tree
# into ${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/ and builds there,
# so the module is built (and found) under that build dir's src/kernel/.
BUILT_MODULE_NAME[0]="cxadc"
BUILT_MODULE_LOCATION[0]="src/kernel"
DEST_MODULE_LOCATION[0]="/updates/dkms"

MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/src/kernel modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/src/kernel clean"

AUTOINSTALL="YES"
REMAKE_INITRD="NO"
